<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afritex | Customer Sign In</title>
    <link rel="stylesheet" href="../styles/customersignin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="form-card">
            <button class="back-arrow" onclick="history.back()">←</button>
            <h2>Customer Sign In</h2>

            <form id="signinForm">
                <input type="email" id="email" placeholder="Email" required>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="toggle-password" data-target="password">👁️</span>
                </div>

            <a href="pages/customerdashboard.html"><button type="submit" class="signin-btn">Sign In</button></a>
            </form>

            <p class="footer-text">Don't have an account? <a href="../pages/customersignup.html">Sign Up</a></p>
        </div>
    </div>

    <script src="../scripts/customersignin.js"></script>
</body>
</html>
